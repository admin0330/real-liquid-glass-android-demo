name: Build and publish APK

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Check out source
        uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.44.6'
          channel: stable
          cache: true

      - name: Restore signing key
        env:
          KEYSTORE_BASE64: ${{ secrets.KEYSTORE_BASE64 }}
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
        run: |
          echo "$KEYSTORE_BASE64" | base64 --decode > android/app/release-keystore.jks
          printf 'storeFile=release-keystore.jks\nstorePassword=%s\nkeyAlias=%s\nkeyPassword=%s\n' \
            "$KEYSTORE_PASSWORD" "$KEY_ALIAS" "$KEY_PASSWORD" > android/key.properties

      - name: Test and build
        run: |
          flutter pub get
          flutter analyze
          flutter test
          flutter build apk --release
          mv build/app/outputs/flutter-apk/app-release.apk \
            "build/app/outputs/flutter-apk/liquid-music-${GITHUB_REF_NAME}.apk"
          APK="build/app/outputs/flutter-apk/liquid-music-${GITHUB_REF_NAME}.apk"
          VERSION="${GITHUB_REF_NAME#v}"
          SHA256="$(sha256sum "$APK" | cut -d ' ' -f 1)"
          SIZE="$(stat -c '%s' "$APK")"
          printf '%s  %s\n' "$SHA256" "$(basename "$APK")" > "$APK.sha256"
          jq -n \
            --arg version "$VERSION" \
            --arg apk_url "$(basename "$APK")" \
            --arg sha256 "$SHA256" \
            --argjson size "$SIZE" \
            --arg notes "Liquid Music ${GITHUB_REF_NAME}" \
            '{version:$version, apk_url:$apk_url, sha256:$sha256, size:$size, notes:$notes}' \
            > build/app/outputs/flutter-apk/latest.json

      - name: Publish GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "$GITHUB_REF_NAME" \
            "build/app/outputs/flutter-apk/liquid-music-${GITHUB_REF_NAME}.apk" \
            "build/app/outputs/flutter-apk/liquid-music-${GITHUB_REF_NAME}.apk.sha256" \
            "build/app/outputs/flutter-apk/latest.json" \
            --title "Liquid Music ${GITHUB_REF_NAME}" \
            --generate-notes

      - name: Configure Aliyun SSH
        env:
          ALIYUN_SSH_PRIVATE_KEY: ${{ secrets.ALIYUN_SSH_PRIVATE_KEY }}
          ALIYUN_SSH_HOST_KEY: ${{ secrets.ALIYUN_SSH_HOST_KEY }}
        run: |
          install -d -m 700 ~/.ssh
          printf '%s\n' "$ALIYUN_SSH_PRIVATE_KEY" > ~/.ssh/aliyun_deploy
          printf '%s\n' "$ALIYUN_SSH_HOST_KEY" > ~/.ssh/known_hosts
          chmod 600 ~/.ssh/aliyun_deploy ~/.ssh/known_hosts

      - name: Publish update mirror to Aliyun ECS
        env:
          ALIYUN_SSH_HOST: ${{ secrets.ALIYUN_SSH_HOST }}
          ALIYUN_SSH_USER: ${{ secrets.ALIYUN_SSH_USER }}
        run: |
          APK="build/app/outputs/flutter-apk/liquid-music-${GITHUB_REF_NAME}.apk"
          SSH=(ssh -i ~/.ssh/aliyun_deploy -o BatchMode=yes -o StrictHostKeyChecking=yes)
          SCP=(scp -i ~/.ssh/aliyun_deploy -o BatchMode=yes -o StrictHostKeyChecking=yes)
          "${SCP[@]}" \
            "$APK" \
            "$APK.sha256" \
            build/app/outputs/flutter-apk/latest.json \
            "$ALIYUN_SSH_USER@$ALIYUN_SSH_HOST:/var/www/liquid-music-updates/"
          "${SSH[@]}" "$ALIYUN_SSH_USER@$ALIYUN_SSH_HOST" \
            "chmod 644 /var/www/liquid-music-updates/liquid-music-${GITHUB_REF_NAME}.apk /var/www/liquid-music-updates/liquid-music-${GITHUB_REF_NAME}.apk.sha256 /var/www/liquid-music-updates/latest.json"
